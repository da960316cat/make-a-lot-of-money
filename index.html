<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛孩放置宇宙</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="tamagotchi-app" class="machine-container">
    
    <div class="machine-header">
      <span class="status">🐾 狀態：🌱 正常</span>
      <span class="money">💰 存款：<span id="money-display">4200</span></span>
      
      <div class="header-btns">
        <button id="open-shop-btn" class="sys-btn shop-btn">🛒 商城</button>
        <button id="minimize-machine-btn" class="sys-btn min-btn">[-] 縮小</button>
      </div>
    </div>

    <div class="machine-screen">
      </div>

    <div class="machine-footer">
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
      <button class="action-btn">🍗 餵食主食罐 (-100)</button>
    </div>

  </div>

</body>
</html>
